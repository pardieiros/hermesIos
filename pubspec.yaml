name: hermes_chat
description: "Flutter iOS client for Hermes Agent"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  web_socket_channel: ^3.0.1
  shared_preferences: ^2.3.3
  flutter_markdown: ^0.7.5
  provider: ^6.1.2
  flutter_local_notifications: ^18.0.1
  device_calendar: ^4.3.2
  url_launcher: ^6.3.1
  permission_handler: ^11.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/hermes_logo.png
